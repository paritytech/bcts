name: Continuous Integration

# Temporarily deactivated 2026-04-24 — will be re-enabled later.
# To re-enable, restore the `pull_request` trigger block below:
#   on:
#     pull_request:
#       paths:
#         - "**.md"
on:
  workflow_dispatch:

permissions: read-all
jobs:
  markdown-link-check:
    name: Link Checker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Link Check
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
